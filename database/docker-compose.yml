services:
  postgres:
    image: postgres:17
    container_name: hotel-rms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_rms
      POSTGRES_USER: hotel_rms
      POSTGRES_PASSWORD: hotel_rms_dev
    ports:
      - "5432:5432"
    volumes:
      - hotel_rms_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  hotel_rms_pgdata:

